version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - touch .env.production
        - '[ -n "$NEXTAUTH_URL" ] && echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.production'
        - '[ -n "$NEXTAUTH_SECRET" ] && echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" >> .env.production'
        - '[ -n "$AUTH_URL" ] && echo "AUTH_URL=$AUTH_URL" >> .env.production'
        - '[ -n "$AUTH_SECRET" ] && echo "AUTH_SECRET=$AUTH_SECRET" >> .env.production'
        - '[ -n "$LINKEDIN_CLIENT_ID" ] && echo "LINKEDIN_CLIENT_ID=$LINKEDIN_CLIENT_ID" >> .env.production'
        - '[ -n "$LINKEDIN_CLIENT_SECRET" ] && echo "LINKEDIN_CLIENT_SECRET=$LINKEDIN_CLIENT_SECRET" >> .env.production'
        - '[ -n "$OPENAI_API_KEY" ] && echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env.production'
        - '[ -n "$OPENAI_MODEL" ] && echo "OPENAI_MODEL=$OPENAI_MODEL" >> .env.production'
        - 'env | grep "^NEXT_PUBLIC_" >> .env.production || true'
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*