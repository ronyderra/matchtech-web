version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - touch .env.production
        - '[ -n "$OPENAI_API_KEY" ] && echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env.production'
        - '[ -n "$OPENAI_MODEL" ] && echo "OPENAI_MODEL=$OPENAI_MODEL" >> .env.production'
        - 'env | grep "^NEXT_PUBLIC_" >> .env.production || true'
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*