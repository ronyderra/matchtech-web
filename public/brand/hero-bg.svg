<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <!-- Subtle vertical stripe pattern -->
    <pattern id="stripes" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="9" height="10" fill="transparent"/>
      <rect x="9" y="0" width="1" height="10" fill="rgba(148,163,184,0.10)"/>
    </pattern>

    <!-- Left (light) to right (stronger) primary tint -->
    <linearGradient id="tint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(10,102,194,0.00)"/>
      <stop offset="35%" stop-color="rgba(10,102,194,0.02)"/>
      <stop offset="60%" stop-color="rgba(10,102,194,0.05)"/>
      <stop offset="100%" stop-color="rgba(10,102,194,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Base app background -->
  <rect width="1920" height="1080" fill="#f3f2ef"/>

  <!-- Stripe texture -->
  <rect width="1920" height="1080" fill="url(#stripes)"/>

  <!-- Primary tint overlay -->
  <rect width="1920" height="1080" fill="url(#tint)"/>
</svg>
